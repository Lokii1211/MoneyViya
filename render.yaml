services:
  # ===== Service 1: MoneyViya API (Python) =====
  - type: web
    name: moneyviya-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: "moneyviya_webhook_2024"

  # ===== Service 2: WhatsApp Bot (Node.js Baileys) =====
  - type: web
    name: moneyviya-bot
    runtime: node
    region: singapore
    plan: free
    rootDir: whatsapp-bot
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      - key: API_URL
        value: "https://moneyviya-api.onrender.com"
