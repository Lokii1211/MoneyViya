services:
  - type: web
    name: moneyviya-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: RENDER_EXTERNAL_URL
        generateValue: false
        # Auto-set by Render — used for self-ping keep-alive
      - key: OPENAI_API_KEY
        sync: false
      - key: WHATSAPP_CLOUD_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: "moneyviya_webhook_2024"
