name: MoneyViya Reminders Cron

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC
    - cron: '30 2 * * *'
    # 9:00 PM IST = 3:30 PM UTC
    - cron: '30 15 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Morning/Evening Reminder
        run: |
          echo "Triggering MoneyViya reminder cron..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}" \
            "https://moneyviya.vercel.app/api/cron/check-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          echo ""
          echo "Done!"
